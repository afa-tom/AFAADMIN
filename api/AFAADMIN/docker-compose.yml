version: "3.8"

services:
  # ===== 后端 API =====
  afaadmin-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: afaadmin-api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - TZ=Asia/Shanghai
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./src/Host/AFAADMIN.WebApi/configs:/app/configs:ro
    depends_on:
      - afaadmin-redis
    networks:
      - afaadmin-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===== Redis 缓存 =====
  afaadmin-redis:
    image: redis:7-alpine
    container_name: afaadmin-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - afaadmin-net

  # ===== Nginx 反向代理 =====
  afaadmin-nginx:
    image: nginx:1.25-alpine
    container_name: afaadmin-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - afaadmin-api
    networks:
      - afaadmin-net

volumes:
  redis-data:

networks:
  afaadmin-net:
    driver: bridge
