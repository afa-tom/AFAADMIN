version: "3.8"

services:
  # ===== 后端 API =====
  afaadmin-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: afaadmin-api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - TZ=Asia/Shanghai
    volumes:
      - ./logs:/app/logs
      - ./src/Host/AFAADMIN.WebApi/configs:/app/configs:ro
    networks:
      - afaadmin-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===== Nginx 反向代理 =====
  afaadmin-nginx:
    image: nginx:1.25-alpine
    container_name: afaadmin-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      # 前端静态资源（M5 阶段挂载构建产物）
      # - ./src/Frontend/afaadmin-web/dist:/usr/share/nginx/html:ro
    depends_on:
      - afaadmin-api
    networks:
      - afaadmin-net

networks:
  afaadmin-net:
    driver: bridge
